name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Test plugin
        shell: bash
        run: |
          mise plugins link --force android-sdk .
          mise list-all android-sdk
          mise install android-sdk@13.0
          mise exec android-sdk@13.0 -- sdkmanager --version
          echo y | mise exec android-sdk@13.0 -- sdkmanager platform-tools
          mise exec android-sdk@13.0 -- adb version

      - name: Test version ordering
        if: matrix.os == 'ubuntu-latest'
        run: mise x lua@5.4 -- lua test/version_order.lua .

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: false

      - name: Run unit tests
        run: mise x lua@5.4 -- ./test/run.sh
